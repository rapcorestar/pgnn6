<!doctype html>
<html lang="en">
  <meta charset="utf-8">
  <title>PGNN Six — Ambient Loop Renderer</title>
  <style>
    html, body { margin: 0; background: #08090c; color: #b9c0c8; font: 14px/1.5 system-ui, sans-serif; }
    main { width: 1280px; margin: 24px auto; }
    canvas { width: 100%; height: auto; display: block; box-shadow: 0 10px 50px #000; }
  </style>
  <main><canvas width="1280" height="720" aria-label="Rendering ambient loop"></canvas></main>
  <script>
    const canvas = document.querySelector('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const W = canvas.width;
    const H = canvas.height;
    const DURATION = 8;
    const FPS = 24;
    const clips = [
      {
        id: 'apartment-window-drift',
        image: '/public/assets/pgnn-six/panorama-apartment.png',
        crop: [0, 22, 1510, 850],
        drift: [76, -7],
        atmosphere: 'dust',
        grade: '#5a3517',
        hum: [45, 68],
      },
      {
        id: 'courtyard-snow-drift',
        image: '/public/assets/pgnn-six/panorama-courtyard.png',
        crop: [88, 12, 1570, 863],
        drift: [-62, 4],
        atmosphere: 'snow',
        grade: '#133763',
        hum: [40, 54],
      },
      {
        id: 'tram-stop-blue-hour',
        image: '/public/assets/pgnn-six/panorama-tramstop.png',
        crop: [74, 20, 1576, 856],
        drift: [42, -4],
        atmosphere: 'mist',
        grade: '#0a2a43',
        hum: [49, 73],
      },
    ];

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const ease = (value) => value * value * (3 - 2 * value);
    const seeded = (seed) => {
      let state = seed >>> 0;
      return () => ((state = Math.imul(1664525, state) + 1013904223 >>> 0) / 4294967296);
    };

    function loadImage(source) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = source;
      });
    }

    function makeAtmosphere(type, seed) {
      const random = seeded(seed);
      const amount = type === 'snow' ? 132 : type === 'dust' ? 84 : 48;
      return Array.from({ length: amount }, () => ({
        x: random() * W,
        y: random() * H,
        r: type === 'snow' ? 0.8 + random() * 2.4 : 0.3 + random() * 1.5,
        speed: type === 'snow' ? 9 + random() * 18 : 3 + random() * 10,
        sway: random() * Math.PI * 2,
        alpha: type === 'snow' ? 0.15 + random() * 0.42 : 0.03 + random() * 0.15,
      }));
    }

    function drawAtmosphere(particles, type, seconds) {
      ctx.save();
      ctx.globalCompositeOperation = type === 'dust' ? 'screen' : 'source-over';
      for (const particle of particles) {
        const y = (particle.y + seconds * particle.speed) % (H + 24) - 12;
        const x = particle.x + Math.sin(seconds * 0.7 + particle.sway) * (type === 'snow' ? 15 : 6);
        ctx.globalAlpha = particle.alpha * (type === 'mist' ? 0.5 + Math.sin(seconds + particle.sway) * 0.25 : 1);
        ctx.fillStyle = type === 'dust' ? '#d9c199' : '#e6f0ff';
        ctx.beginPath();
        ctx.arc(x, y, particle.r, 0, Math.PI * 2);
        ctx.fill();
      }
      if (type === 'mist') {
        const wash = ctx.createLinearGradient(0, H * 0.48, 0, H);
        wash.addColorStop(0, 'rgba(163, 193, 217, 0)');
        wash.addColorStop(1, 'rgba(113, 150, 182, 0.1)');
        ctx.globalAlpha = 0.5 + Math.sin(seconds * 0.6) * 0.08;
        ctx.fillStyle = wash;
        ctx.fillRect(0, 0, W, H);
      }
      ctx.restore();
    }

    function drawFilm(seconds, grade) {
      const random = seeded(Math.floor(seconds * FPS) + 7127);
      const image = ctx.getImageData(0, 0, W, H);
      const data = image.data;
      for (let index = 0; index < data.length; index += 16) {
        const grain = (random() - 0.5) * 9;
        data[index] = clamp(data[index] + grain, 0, 255);
        data[index + 1] = clamp(data[index + 1] + grain, 0, 255);
        data[index + 2] = clamp(data[index + 2] + grain, 0, 255);
      }
      ctx.putImageData(image, 0, 0);

      const vignette = ctx.createRadialGradient(W / 2, H / 2, H * 0.13, W / 2, H / 2, W * 0.7);
      vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
      vignette.addColorStop(0.72, 'rgba(0, 0, 0, 0.05)');
      vignette.addColorStop(1, 'rgba(0, 0, 0, 0.42)');
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'soft-light';
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = grade;
      ctx.fillRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
    }

    function drawFrame(image, clip, particles, seconds) {
      const progress = ease(seconds / DURATION);
      const [baseX, baseY, baseW, baseH] = clip.crop;
      const breathing = 1 - Math.sin(progress * Math.PI) * 0.018;
      const cropW = baseW * breathing;
      const cropH = baseH * breathing;
      const x = baseX + clip.drift[0] * progress - (cropW - baseW) / 2;
      const y = baseY + clip.drift[1] * progress - (cropH - baseH) / 2;
      const exposure = 0.97 + Math.sin(seconds * 0.7 + clip.hum[0]) * 0.018;

      ctx.fillStyle = '#050609';
      ctx.fillRect(0, 0, W, H);
      ctx.filter = `brightness(${exposure}) contrast(1.04) saturate(0.86)`;
      ctx.drawImage(image, x, y, cropW, cropH, 0, 0, W, H);
      ctx.filter = 'none';
      drawAtmosphere(particles, clip.atmosphere, seconds);
      drawFilm(seconds, clip.grade);
    }

    function createAmbientTrack([low, high]) {
      const audio = new AudioContext({ sampleRate: 44100 });
      const destination = audio.createMediaStreamDestination();
      const master = audio.createGain();
      master.gain.value = 0.18;
      master.connect(destination);
      const filter = audio.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 260;
      filter.Q.value = 0.35;
      filter.connect(master);

      [low, high].forEach((frequency, index) => {
        const oscillator = audio.createOscillator();
        const gain = audio.createGain();
        oscillator.type = index ? 'sine' : 'triangle';
        oscillator.frequency.value = frequency;
        gain.gain.value = index ? 0.032 : 0.05;
        oscillator.connect(gain).connect(filter);
        oscillator.start();
      });

      const noiseBuffer = audio.createBuffer(1, audio.sampleRate * (DURATION + 1), audio.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      const random = seeded(low * 97);
      for (let index = 0; index < data.length; index += 1) data[index] = (random() * 2 - 1) * 0.4;
      const noise = audio.createBufferSource();
      const noiseGain = audio.createGain();
      noiseGain.gain.value = 0.09;
      noise.connect(noiseGain).connect(filter);
      noise.start();
      return { audio, stream: destination.stream };
    }

    async function record(clip, clipIndex) {
      const image = await loadImage(clip.image);
      const particles = makeAtmosphere(clip.atmosphere, 40 + clipIndex * 11);
      const ambient = createAmbientTrack(clip.hum);
      await ambient.audio.resume();
      const canvasStream = canvas.captureStream(FPS);
      const stream = new MediaStream([...canvasStream.getVideoTracks(), ...ambient.stream.getAudioTracks()]);
      const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9,opus', videoBitsPerSecond: 5_500_000 });
      const chunks = [];
      recorder.ondataavailable = (event) => event.data.size && chunks.push(event.data);

      const done = new Promise((resolve) => {
        recorder.onstop = async () => {
          const video = new Blob(chunks, { type: 'video/webm' });
          await fetch(`/upload?clip=${encodeURIComponent(clip.id)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'video/webm' },
            body: video,
          });
          ambient.audio.close();
          resolve();
        };
      });

      let start;
      recorder.start(500);
      const frame = (now) => {
        start ??= now;
        const seconds = Math.min((now - start) / 1000, DURATION);
        drawFrame(image, clip, particles, seconds);
        if (seconds < DURATION) requestAnimationFrame(frame);
        else recorder.stop();
      };
      requestAnimationFrame(frame);
      await done;
      await new Promise((resolve) => setTimeout(resolve, 350));
      await fetch(`/done?clip=${encodeURIComponent(clip.id)}`);
    }

    (async () => {
      const clipId = new URLSearchParams(window.location.search).get('clip');
      const selectedClips = clipId ? clips.filter((clip) => clip.id === clipId) : clips;
      if (!selectedClips.length) throw new Error(`Unknown clip: ${clipId}`);
      for (const [index, clip] of selectedClips.entries()) await record(clip, clips.indexOf(clip));
      document.title = 'PGNN Six — Ambient Loops Complete';
    })().catch((error) => {
      console.error(error);
      document.title = `Ambient render failed: ${error.message}`;
    });
  </script>
</html>
